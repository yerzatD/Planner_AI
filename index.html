<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Planner_AI — вход</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="auth-shell">
  <div class="auth-visual">
    <div class="auth-brand"><span class="dot"></span> Planner_AI</div>

    <div class="auth-headline">
      <h1>Опиши неделю.<br><em>ИИ распишет</em> уроки.</h1>
      <p>Скажи, сколько видеоуроков нужно посмотреть и чем ты занят — Planner_AI расставит их вокруг дедлайнов конспекта, практики, ДЗ и квиза.</p>
    </div>

    <div class="week-strip" id="weekStrip" aria-hidden="true"></div>
  </div>

  <div class="auth-panel">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" type="button">Вход</button>
        <button class="auth-tab" id="tabRegister" type="button">Регистрация</button>
      </div>

      <div class="form-alert" id="formAlert"></div>

      <!-- LOGIN -->
      <form id="loginForm">
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" required autocomplete="email" placeholder="you@juz40.kz" />
        </div>
        <div class="field">
          <label for="loginPassword">Пароль</label>
          <input id="loginPassword" type="password" required autocomplete="current-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="loginSubmit">
          <span class="btn-label">Войти</span>
        </button>
        <p class="form-note">Ещё нет аккаунта? <a href="#" id="goToRegister" style="color:var(--ink); font-weight:600;">Зарегистрируйся</a></p>
      </form>

      <!-- REGISTER -->
      <form id="registerForm" style="display:none;">
        <div class="field">
          <label for="regUsername">Имя</label>
          <input id="regUsername" type="text" required autocomplete="name" placeholder="Ерзат" />
        </div>
        <div class="field">
          <label for="regEmail">Email</label>
          <input id="regEmail" type="email" required autocomplete="email" placeholder="you@juz40.kz" />
        </div>
        <div class="field">
          <label for="regPassword">Пароль</label>
          <input id="regPassword" type="password" required autocomplete="new-password" minlength="6" placeholder="Минимум 6 символов" />
        </div>
        <button class="btn btn-primary btn-block" type="submit" id="registerSubmit">
          <span class="btn-label">Создать аккаунт</span>
        </button>
        <p class="form-note">Уже есть аккаунт? <a href="#" id="goToLogin" style="color:var(--ink); font-weight:600;">Войди</a></p>
      </form>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
